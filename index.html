<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDig UI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 30px 15px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e1e24; padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        h1 { color: #4CAF50; margin-bottom: 5px; }
        p.subtitle { color: #aaa; margin-top: 0; }
        .input-group { margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        input, select { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2b2b36; color: white; font-size: 15px; }
        button { padding: 12px 20px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        #results { margin-top: 15px; text-align: left; display: none; }
        .server-info { background: #2b2b36; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #4CAF50; display: flex; justify-content: space-between; flex-wrap: wrap;}
        .info-col { flex: 1; min-width: 200px; }
        .teams-container { display: flex; gap: 20px; justify-content: space-between; flex-wrap: wrap; }
        .team-box { flex: 1; min-width: 300px; background: #2b2b36; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .team-box h3 { text-align: center; margin-top: 0; color: #4CAF50; border-bottom: 2px solid #444; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; font-size: 14px; }
        th { background-color: #252530; color: #fff; }
        tr:nth-child(even) { background-color: #1a1a22; }
        .error-box { background: #8b0000; color: white; padding: 10px; border-radius: 6px; display: none; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QuickDig UI</h1>
        <p class="subtitle">Multi-Game Server Monitor</p>
        
        <div class="input-group">
            <select id="gameType">
                <option value="battlefield2">Project Reality / BF2</option>
                <option value="csgo">CS:GO</option>
                <option value="css">CS: Source</option>
                <option value="arma3">Arma 3</option>
                <option value="squad">Squad</option>
            </select>
            <input type="text" id="serverIp" placeholder="Server IP" required>
            <input type="number" id="serverPort" placeholder="Query Port" required>
            <button onclick="startFetching()">Search</button>
        </div>

        <div id="loading" style="display:none; color: #aaa; margin-top: 15px;">Fetching server data...</div>
        <div id="error" class="error-box"></div>

        <div id="results">
            <div class="server-info">
                <div class="info-col">
                    <h2 id="serverName" style="margin:0 0 10px 0; color:#fff;">-</h2>
                    <p style="margin:5px 0;"><b>Mode:</b> <span id="serverMode">-</span></p>
                    <p style="margin:5px 0;"><b>Players:</b> <span id="playerCount">0/0</span></p>
                </div>
                <div class="info-col">
                    <p style="margin:5px 0;"><b>Current Map:</b> <span id="serverMap">-</span></p>
                    <p style="margin:5px 0; color: #4CAF50;"><b>Next Map:</b> <span id="serverNextMap">-</span></p>
                </div>
            </div>

            <div class="teams-container">
                <div class="team-box">
                    <h3 id="team1Name">Team 1</h3>
                    <table>
                        <thead><tr><th>Name</th><th>Score</th><th>Kills</th><th>Deaths</th><th>Ping</th></tr></thead>
                        <tbody id="team1Table"></tbody>
                    </table>
                </div>
                <div class="team-box">
                    <h3 id="team2Name">Team 2</h3>
                    <table>
                        <thead><tr><th>Name</th><th>Score</th><th>Kills</th><th>Deaths</th><th>Ping</th></tr></thead>
                        <tbody id="team2Table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let fetchInterval = null;
        const API_URL = "/api/status"; 

        function startFetching() {
            let ip = document.getElementById("serverIp").value.trim();
            let port = document.getElementById("serverPort").value.trim();
            let game = document.getElementById("gameType").value;

            if(!ip || !port) {
                showError("Please enter IP and Port.");
                return;
            }

            if (fetchInterval) clearInterval(fetchInterval);
            document.getElementById("loading").style.display = "block";
            document.getElementById("results").style.display = "none";
            hideError();

            fetchData(ip, port, game);
            fetchInterval = setInterval(() => fetchData(ip, port, game, true), 5000);
        }

        async function fetchData(ip, port, game, isSilent = false) {
            try {
                let response = await fetch(`${API_URL}?ip=${ip}&port=${port}&game=${game}`);
                let data = await response.json();

                if (!isSilent) document.getElementById("loading").style.display = "none";

                if(!data.success) {
                    showError(data.error);
                    if (fetchInterval) clearInterval(fetchInterval);
                    return;
                }

                document.getElementById("serverName").innerText = data.name;
                document.getElementById("serverMap").innerText = data.map;
                document.getElementById("serverNextMap").innerText = data.raw?.bf2_nextmap || "N/A";
                document.getElementById("playerCount").innerText = `${data.numplayers} / ${data.maxplayers}`;
                document.getElementById("serverMode").innerText = data.raw?.gametype || "N/A";
                document.getElementById("team1Name").innerText = data.raw?.bf2_team1 || "Team 1";
                document.getElementById("team2Name").innerText = data.raw?.bf2_team2 || "Team 2";

                let t1Body = document.getElementById("team1Table");
                let t2Body = document.getElementById("team2Table");
                t1Body.innerHTML = ""; t2Body.innerHTML = "";

                let t1 = [], t2 = [];
                data.players.forEach(p => {
                    let team = p.raw?.team ?? p.team ?? 1;
                    if (team == 1) t1.push(p); else t2.push(p);
                });

                function renderRows(players, tbody) {
                    if(players.length === 0) {
                        tbody.innerHTML = "<tr><td colspan='5'>No players</td></tr>";
                        return;
                    }
                    players.sort((a, b) => (b.score || 0) - (a.score || 0));
                    players.forEach(p => {
                        let score = p.raw?.score ?? p.score ?? "-";
                        let kills = p.raw?.kills ?? p.kills ?? "-";
                        let deaths = p.raw?.deaths ?? p.deaths ?? "-";
                        let ping = p.raw?.ping ?? p.ping ?? "-";
                        
                        tbody.innerHTML += `<tr>
                            <td>${p.name || 'Unknown'}</td>
                            <td>${score}</td>
                            <td>${kills}</td>
                            <td>${deaths}</td>
                            <td>${ping} ms</td>
                        </tr>`;
                    });
                }

                renderRows(t1, t1Body);
                renderRows(t2, t2Body);
                document.getElementById("results").style.display = "block";

            } catch (err) {
                if (!isSilent) {
                    document.getElementById("loading").style.display = "none";
                    showError("Backend connection failed.");
                }
            }
        }

        function showError(msg) {
            let errDiv = document.getElementById("error");
            errDiv.innerText = msg;
            errDiv.style.display = "block";
        }
        function hideError() {
            document.getElementById("error").style.display = "none";
        }
    </script>
</body>
</html>
