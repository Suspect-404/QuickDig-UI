<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDig UI</title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; 
            color: #ffffff; 
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1e1e24; 
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h1 { color: #4CAF50; }
        .input-group { margin-bottom: 20px; }
        input {
            padding: 12px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2b2b36;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            background: #4CAF50; 
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #45a049; }
        
        
        #results { margin-top: 30px; text-align: left; display: none; }
        .server-info { background: #2b2b36; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        th { background-color: #333; color: #4CAF50; }
    </style>
</head>
<body>

    <div class="container">
        <h1>QuickDig UI 🚀</h1>
        <p>Fast, Login-Free Game Server Status</p>
        
        
        <div class="input-group">
            <input type="text" id="serverIp" placeholder="Server IP (e.g. 62.122.215.253)" required>
            <input type="number" id="serverPort" placeholder="Port (e.g. 29900)" required>
            <button onclick="fetchData()">Search</button>
        </div>

        <div id="loading" style="display:none; color: #aaa;">Searching... ⏳</div>

        
        <div id="results">
            <div class="server-info">
                <h3 id="serverName">Server Name: Loading...</h3>
                <p id="serverMap">Map: Loading...</p>
                <p id="playerCount">Players: 0/0</p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Player Name</th>
                        <th>Score</th>
                        <th>Ping</th>
                        <th>Team</th>
                    </tr>
                </thead>
                <tbody id="playersTable">
                   
                </tbody>
            </table>
        </div>
    </div>

    <script>
        
        function fetchData() {
            let ip = document.getElementById("serverIp").value;
            let port = document.getElementById("serverPort").value;

            if(!ip || !port) {
                alert("Please enter both IP and Port!");
                return;
            }

           
            document.getElementById("loading").style.display = "block";
            document.getElementById("results").style.display = "none";

           
            setTimeout(() => {
                document.getElementById("loading").style.display = "none";
                alert("الزرار شغال تمام! أخدنا الـ IP: " + ip + " والـ Port: " + port + "\nالخطوة الجاية هنربطه بكود Node.js عشان يجيب الداتا الحقيقية.");
            }, 1000);
        }
    </script>

</body>
</html>
